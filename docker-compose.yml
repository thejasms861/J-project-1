version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - ai-engine

  backend:
    build: 
      context: ./backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@db:5432/stadium
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  ai-engine:
    build:
      context: ./ai-engine
    environment:
      - MODEL_ENV=production

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: stadium
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  frontend-user:
    build:
      context: ./frontend-user
    ports:
      - "3000:3000"

  frontend-admin:
    build:
      context: ./frontend-admin
    ports:
      - "5173:5173"
